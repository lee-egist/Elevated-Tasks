<div id="onboardingModal" class="fixed inset-0 bg-gray-900 bg-opacity-90 hidden items-center justify-center z-[100]">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col transform transition-all">
    
    <div class="px-6 py-8 text-center bg-gradient-to-br from-blue-600 to-indigo-700">
      <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg text-3xl">
        🚀
      </div>
      <h2 class="text-2xl font-bold text-white">Welcome to Elevated Tasks</h2>
      <p class="text-blue-100 text-sm mt-2">Let's set up your profile so your team knows who you are.</p>
    </div>
    
    <form id="onboardingForm" onsubmit="handleOnboardingSubmit(event)" class="p-6 space-y-5">
      
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Display Name <span class="text-red-500">*</span></label>
        <input type="text" id="onboardName" required placeholder="e.g., Erick Gist" class="w-full bg-gray-50 border border-gray-300 rounded-lg text-sm text-gray-900 p-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
        <p class="text-xs text-gray-500 mt-1">This is how you will appear in assignee dropdowns.</p>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Weekly Capacity (Hours)</label>
        <input type="number" id="onboardCapacity" required min="1" max="168" value="40" class="w-full bg-gray-50 border border-gray-300 rounded-lg text-sm text-gray-900 p-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
        <p class="text-xs text-gray-500 mt-1">Used to calculate team workload and prevent burnout.</p>
      </div>

      <button type="submit" id="onboardingSubmitBtn" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition-all mt-4">
        Complete Setup & Enter Dashboard
      </button>
      
    </form>
  </div>
</div>
