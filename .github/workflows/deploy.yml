name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Using the latest Node 24 environment

      - name: Install Dependencies
        run: npm install

      - name: Install Clasp Globally
        run: npm install -g @google/clasp

      - name: Set Target Script ID
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TARGET_SCRIPT_ID=${{ secrets.PROD_SCRIPT_ID }}" >> $GITHUB_ENV
          else
            echo "TARGET_SCRIPT_ID=${{ secrets.DEV_SCRIPT_ID }}" >> $GITHUB_ENV
          fi

      - name: Create Clasp Config
        run: |
          cat <<EOF > .clasp.json
          {
            "scriptId": "${{ env.TARGET_SCRIPT_ID }}",
            "rootDir": "src"
          }
          EOF

      - name: Create Clasp Auth
        run: |
          cat <<EOF > ~/.clasprc.json
          ${{ secrets.CLASPRC_JSON }}
          EOF

      - name: Run Linter
        run: npx eslint src/

      - name: Push to Google
        run: clasp push -f

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: clasp deploy -i "${{ secrets.PROD_DEPLOYMENT_ID }}" -d "Prod Release:${{ github.sha }}"