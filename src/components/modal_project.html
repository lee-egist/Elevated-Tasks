<div id="projectModal" class="fixed inset-0 bg-gray-900 bg-opacity-60 overflow-y-auto h-full w-full items-center justify-center z-[60] transition-opacity" style="display: none;">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 transform transition-all relative">
    
    <div class="flex justify-between items-center p-5 border-b border-gray-200 bg-gray-50 rounded-t-xl">
      <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">📂 Create New Project</h3>
      <button type="button" onclick="closeProjectModal()" class="text-gray-400 hover:text-gray-600 transition-colors text-2xl">✕</button>
    </div>
    
    <form id="projectForm" onsubmit="submitNewProject(event)" class="p-5">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Project Name <span class="text-red-500">*</span></label>
          <input type="text" id="new-project-name" class="w-full border border-gray-300 rounded-lg shadow-sm p-2.5 outline-none focus:ring-2 focus:ring-blue-500" required placeholder="e.g., Q3 Marketing Push">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Description (Optional)</label>
          <textarea id="new-project-desc" class="w-full border border-gray-300 rounded-lg shadow-sm p-2.5 outline-none focus:ring-2 focus:ring-blue-500" rows="3" placeholder="What is the goal of this project?"></textarea>
        </div>
      </div>
      
      <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-gray-100">
        <button type="button" onclick="closeProjectModal()" class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition-colors">Cancel</button>
        <button type="submit" id="submitProjectBtn" class="px-5 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">Create Project</button>
      </div>
    </form>
    
  </div>
</div>
