<script>
  // --- PROJECT DATA & UI ---
  let globalProjects = [];

  window.addEventListener('DOMContentLoaded', fetchProjects);

  function fetchProjects() {
    google.script.run
      .withSuccessHandler(function (projects) {
        globalProjects = projects;
        populateProjectDropdowns();
        if (typeof renderDashboardProjectFilter === 'function') {
          renderDashboardProjectFilter(projects);
        }
      })
      .withFailureHandler(function (err) {
        console.error("Failed to load projects: ", err);
      })
      .getDashboardProjects(); // Assuming this returns dbGetProjects()
  }

  function populateProjectDropdowns() {
    const addSelect = document.getElementById('add-project');
    const editSelect = document.getElementById('edit-project');

    let optionsHtml = '<option value="">-- No Project (Unassigned) --</option>';
    globalProjects.forEach(p => {
      optionsHtml += `<option value="${p.id}">${p.name}</option>`;
    });

    if (addSelect) addSelect.innerHTML = optionsHtml;
    if (editSelect) editSelect.innerHTML = optionsHtml;
  }

  function handleCreateProject() {
    const projectName = prompt("Enter the name of the new Project:\n(You will automatically be set as the Owner)");
    if (!projectName || projectName.trim() === "") return;

    const btns = document.querySelectorAll('button[onclick="handleCreateProject()"]');
    btns.forEach(b => { b.innerText = "..."; b.disabled = true; });

    google.script.run
      .withSuccessHandler(function (newProject) {
        globalProjects.push(newProject);
        globalProjects.sort((a, b) => a.name.localeCompare(b.name));
        populateProjectDropdowns();

        if (typeof renderDashboardProjectFilter === 'function') {
          renderDashboardProjectFilter(globalProjects);
        }

        const addSelect = document.getElementById('add-project');
        const editSelect = document.getElementById('edit-project');
        if (addSelect && document.getElementById('addModal').style.display !== 'none') {
          addSelect.value = newProject.id;
        }
        if (editSelect && !document.getElementById('editModal').classList.contains('hidden')) {
          editSelect.value = newProject.id;
        }
        btns.forEach(b => { b.innerText = "+ New"; b.disabled = false; });
      })
      .withFailureHandler(function (err) {
        alert("Failed to create project: " + err.message);
        btns.forEach(b => { b.innerText = "+ New"; b.disabled = false; });
      })
      .createNewProject(projectName); // Ensure this maps to dbCreateProject() on backend
  }

  // --- ADD TASK MODAL ---
  function triggerAddTask() {
    document.getElementById('add-title').value = '';
    document.getElementById('add-description').value = '';
    document.getElementById('add-project').value = '';
    document.getElementById('add-assignee').value = '';
    document.getElementById('add-priority').value = 'medium';
    document.getElementById('add-type').value = 'general';
    document.getElementById('add-start-date').value = '';
    document.getElementById('add-due-date').value = '';
    document.getElementById('add-blocked-by').value = '';

    document.getElementById('addModal').style.display = 'flex';
    document.getElementById('add-title').focus();
  }

  function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }

  function submitNewTask(ev) {
    ev.preventDefault();
    const btnEl = document.getElementById('submitAddBtn');
    const title = document.getElementById('add-title').value.trim();
    if (!title) return;

    btnEl.innerText = "Creating...";
    btnEl.disabled = true;

    const projectId = document.getElementById('add-project').value;
    
    // Explicitly mapping payload keys to Supabase column names
    const newTaskData = {
      title: title,
      description: document.getElementById('add-description').value,
      project_id: projectId === "" ? null : projectId,
      assignee: document.getElementById('add-assignee').value || null,
      priority: document.getElementById('add-priority').value,
      status: "open",
      type: document.getElementById('add-type').value,
      start_date: document.getElementById('add-start-date').value || null,
      due_date: document.getElementById('add-due-date').value || null,
      blocked_by: document.getElementById('add-blocked-by').value || null
    };

    google.script.run
      .withSuccessHandler(function () {
        btnEl.innerText = "Create Task";
        btnEl.disabled = false;
        closeAddModal();
        loadTasks(); // Fetch fresh data from DB
      })
      .withFailureHandler(function (error) {
        alert("Failed to create task: " + error.message);
        btnEl.innerText = "Create Task";
        btnEl.disabled = false;
      })
      .createDashboardTask(newTaskData); // REMOVED Google Tasks '@default' arg!
  }

  // --- EDIT MODAL LOGIC ---
  function openEditModal(taskId) {
    const task = currentTasks.find(t => t.id === taskId);
    
    if (!task) {
      console.error("Task not found for editing!");
      return;
    }

    const idField = document.getElementById('edit-task-id');
    if (idField) idField.value = task.id;

    const titleField = document.getElementById('edit-title');
    if (titleField) titleField.value = task.title || "";

    const descField = document.getElementById('edit-description');
    if (descField) descField.value = task.description || "";

    const projectField = document.getElementById('edit-project');
    if (projectField) projectField.value = task.project_id || ""; 

    const statusField = document.getElementById('edit-status');
    if (statusField) statusField.value = task.status || "open";

    const priorityField = document.getElementById('edit-priority');
    if (priorityField) priorityField.value = task.priority || "medium";

    const assigneeField = document.getElementById('edit-assignee');
    if (assigneeField) assigneeField.value = task.assignee || "";
    
    const typeField = document.getElementById('edit-type');
    if (typeField) typeField.value = task.type || "general";
    
    const startDateField = document.getElementById('edit-start-date');
    if (startDateField) startDateField.value = task.start_date || "";
    
    const dueDateField = document.getElementById('edit-due-date');
    if (dueDateField) dueDateField.value = task.due_date || "";
    
    const blockedByField = document.getElementById('edit-blocked-by');
    if (blockedByField) blockedByField.value = task.blocked_by || "";

    const modal = document.getElementById('editModal');
    if (modal) {
      modal.classList.remove('hidden'); 
      modal.style.display = 'flex';
    }
  }

  function closeEditModal() { 
    const modal = document.getElementById('editModal');
    if(modal) {
      modal.classList.add('hidden');
      modal.style.display = 'none';
    }
  }

  function saveTaskEdit(ev) {
    ev.preventDefault();
    const btn = document.getElementById('saveBtn');
    const text = document.getElementById('saveText');
    const spinner = document.getElementById('saveSpinner');

    btn.disabled = true;
    text.innerText = "Saving...";
    if (spinner) spinner.classList.remove('hidden');

    // UNIFIED ID TRACKING
    const taskId = document.getElementById('edit-task-id').value;
    const projectId = document.getElementById('edit-project').value;

    const updatedData = {
      title: document.getElementById('edit-title').value,
      description: document.getElementById('edit-description').value,
      project_id: projectId === "" ? null : projectId,
      assignee: document.getElementById('edit-assignee').value || null,
      priority: document.getElementById('edit-priority').value,
      status: document.getElementById('edit-status').value,
      type: document.getElementById('edit-type').value,
      start_date: document.getElementById('edit-start-date').value || null,
      due_date: document.getElementById('edit-due-date').value || null,
      blocked_by: document.getElementById('edit-blocked-by').value || null
    };

    google.script.run
      .withSuccessHandler(() => {
        // Quick local state update to make UI feel instant
        const taskIndex = currentTasks.findIndex(t => t.id === taskId);
        if (taskIndex > -1) {
          currentTasks[taskIndex] = { ...currentTasks[taskIndex], ...updatedData };
          // Inject the project name back into the local object so the UI render doesn't break
          if(projectId) {
            const matchedProj = globalProjects.find(p => p.id === projectId);
            if(matchedProj) currentTasks[taskIndex].projects = { name: matchedProj.name };
          } else {
             currentTasks[taskIndex].projects = null;
          }
        }
        applyFiltersAndSort();
        closeEditModal();
        resetSaveButton(btn, text, spinner);
      })
      .withFailureHandler((err) => {
        alert("Error saving task: " + err.message);
        resetSaveButton(btn, text, spinner);
      })
      .updateDashboardTaskDetails(taskId, updatedData); // REMOVED Google Tasks taskListId!
  }

  function resetSaveButton(btn, text, spinner) {
    btn.disabled = false;
    text.innerText = "Save Changes";
    if (spinner) spinner.classList.add('hidden');
  }

  // --- DELETE TASK MODAL ---
  let taskPendingDeletion = null;

  function handleDeleteFromModal() {
    const taskId = document.getElementById('edit-task-id').value;
    if (!taskId) return;
    taskPendingDeletion = taskId;
    document.getElementById('deleteModal').style.display = 'flex';
  }

  function closeDeleteModal() {
    taskPendingDeletion = null;
    document.getElementById('deleteModal').style.display = 'none';
    const btn = document.getElementById('confirmDeleteBtn');
    if (btn) { btn.innerText = 'Yes, Delete'; btn.disabled = false; }
  }

  function executeDeleteTask() {
    if (!taskPendingDeletion) return;
    const taskId = taskPendingDeletion;
    const btn = document.getElementById('confirmDeleteBtn');

    btn.innerText = "Deleting...";
    btn.disabled = true;

    closeDeleteModal();
    closeEditModal();

    const cardElement = document.getElementById('task-' + taskId);
    if (cardElement) cardElement.remove();

    google.script.run
      .withFailureHandler(function (error) {
        alert("Server failed to delete task: " + error.message);
        loadTasks();
      })
      .deleteTask(taskId);
  }

  // --- UTILITIES ---
  function copyTaskId(event) {
    const idInput = document.getElementById('display-task-id');
    const btn = event.currentTarget;
    navigator.clipboard.writeText(idInput.value).then(() => {
      const originalText = btn.innerText;
      btn.innerText = 'Copied!';
      btn.classList.add('bg-green-100', 'text-green-700', 'border-green-200');
      setTimeout(() => {
        btn.innerText = originalText;
        btn.classList.remove('bg-green-100', 'text-green-700', 'border-green-200');
      }, 2000);
    }).catch(err => { alert("Failed to copy text: " + err); });
  }

  // --- IMPORT MODAL ---
  function openImportModal() { document.getElementById('importModal').style.display = 'flex'; }
  function closeImportModal() { document.getElementById('importModal').style.display = 'none'; }

  function runGoogleTasksMigration(btnElement) {
    const originalHtml = btnElement.innerHTML;
    btnElement.innerHTML = `<div class="p-4 text-center w-full font-bold text-blue-600">Migrating Tasks... Please wait ⏳</div>`;
    btnElement.disabled = true;

    google.script.run
      .withSuccessHandler((count) => {
        alert(`Success! Imported ${count} tasks into Supabase.`);
        closeImportModal();
        btnElement.innerHTML = originalHtml;
        btnElement.disabled = false;
        loadTasks(); 
      })
      .withFailureHandler((err) => {
        alert("Migration failed: " + err.message);
        btnElement.innerHTML = originalHtml;
        btnElement.disabled = false;
      })
      .migrateLegacyGoogleTasks();
  }

  // --- CSV UPLOAD HANDLING ---
  let selectedPlatform = 'generic';

  function triggerCSVUpload(platform) {
    selectedPlatform = platform;
    document.getElementById('csvFileInput').click();
  }

  function handleCSVSelection(event) {
    const file = event.target.files[0];
    if (!file) return;

    document.getElementById('csvUploadProgress').classList.remove('hidden');
    document.getElementById('csvUploadStatus').innerText = `Uploading ${file.name} to server...`;

    const reader = new FileReader();
    reader.onload = function(e) {
      const csvContent = e.target.result;
      google.script.run
        .withSuccessHandler(function(result) {
          document.getElementById('csvUploadProgress').classList.add('hidden');
          alert(`Success! Imported ${result.count} tasks from ${selectedPlatform}.`);
          closeImportModal();
          loadTasks(); 
        })
        .withFailureHandler(function(err) {
          document.getElementById('csvUploadProgress').classList.add('hidden');
          alert(`Error importing CSV: ${err.message}`);
        })
        .processCSVImport(csvContent, selectedPlatform);
    };
    reader.readAsText(file);
    event.target.value = ''; 
  }
</script>
