<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <?!= include('frontend/style'); ?>
  </head>
  <body class="p-4 sm:p-6 font-sans antialiased text-gray-800">
    <div class="max-w-7xl mx-auto">
      
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
          <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Elevated Tasks Dashboard</h1>
          <p class="text-gray-500 mt-1">Manage, filter, and sort your tasks.</p>
        </div>
        <div class="flex items-center gap-3 self-end md:self-auto">
          <div class="inline-flex bg-gray-200 rounded-lg p-1">
            <button id="btn-view-board" onclick="switchView('board')" class="px-3 py-1.5 bg-white shadow-sm rounded-md text-sm font-medium text-gray-800 transition-colors">Board</button>
            <button id="btn-view-table" onclick="switchView('table')" class="px-3 py-1.5 text-gray-600 hover:text-gray-800 rounded-md text-sm font-medium transition-colors">Table</button>
          </div>
          <button onclick="loadTasks()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg shadow transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            <span class="hidden sm:inline">Refresh</span>
          </button>
        </div>
      </div>

      <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-8 flex flex-col xl:flex-row gap-4 items-center justify-between">
        <div class="top-bar w-full xl:w-1/3 mb-0">
          <input type="text" id="filter-search" oninput="applyFiltersAndSort()" placeholder="Search tasks, assignee, project..." class="search-input">
          <button id="addTaskBtn" class="primary-btn shrink-0" onclick="triggerAddTask()">+ Add Task</button>
        </div>

        <div class="flex flex-wrap lg:flex-nowrap gap-3 w-full xl:w-auto flex-1 xl:flex-initial">
          <div class="flex-1 min-w-[140px]"><select id="filter-status" onchange="applyFiltersAndSort()" class="block w-full rounded-lg border-gray-300 border py-2 px-3 text-sm outline-none text-gray-700 bg-gray-50 hover:bg-white transition-colors"><option value="all">All Statuses</option><option value="open">Open</option><option value="in_progress">In Progress</option><option value="blocked">Blocked</option><option value="completed">Completed</option></select></div>
          <div class="flex-1 min-w-[140px]"><select id="filter-priority" onchange="applyFiltersAndSort()" class="block w-full rounded-lg border-gray-300 border py-2 px-3 text-sm outline-none text-gray-700 bg-gray-50 hover:bg-white transition-colors"><option value="all">All Priorities</option><option value="critical">Critical</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></div>
          <div class="flex-1 min-w-[140px]"><select id="filter-project" onchange="applyFiltersAndSort()" class="block w-full rounded-lg border-gray-300 border py-2 px-3 text-sm outline-none text-gray-700 bg-gray-50 hover:bg-white transition-colors"><option value="all">All Projects</option></select></div>
          <div class="flex-1 min-w-[180px]"><select id="sort-by" onchange="applyFiltersAndSort()" class="block w-full rounded-lg border-gray-300 border py-2 pl-3 pr-8 text-sm outline-none text-gray-700 bg-gray-50 hover:bg-white transition-colors"><option value="default">Sort: Default</option><option value="dueDateAsc">Due Date (Earliest First)</option><option value="dueDateDesc">Due Date (Latest First)</option><option value="priorityDesc">Priority (High to Low)</option><option value="priorityAsc">Priority (Low to High)</option><option value="titleAsc">Title (A-Z)</option><option value="projectAsc">Project (A-Z)</option></select></div>
        </div>
      </div>
      
      <div id="loading" class="flex flex-col items-center justify-center py-20"><span class="text-gray-600 font-medium">Fetching your workspace tasks...</span></div>
      <div id="no-results" class="hidden flex flex-col items-center justify-center py-20 bg-white rounded-xl shadow-sm border border-gray-200"><h3 class="text-lg font-medium text-gray-900">No tasks found</h3><button onclick="clearFilters()" class="mt-4 text-blue-600 hover:text-blue-800 font-medium transition-colors">Clear all filters</button></div>
      
      <div id="board" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="bg-gray-200 rounded-xl p-4 border border-gray-300 shadow-sm flex flex-col h-full"><div class="flex items-center justify-between mb-4 px-1"><h2 class="font-semibold text-gray-700">Open</h2><span id="count-open" class="bg-gray-300 text-gray-700 text-xs font-bold px-2 py-1 rounded-full">0</span></div><div id="col-open" class="kanban-column space-y-3 flex-1 rounded-lg" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event, 'open')"></div></div>
        <div class="bg-blue-50 rounded-xl p-4 border border-blue-200 shadow-sm flex flex-col h-full"><div class="flex items-center justify-between mb-4 px-1"><h2 class="font-semibold text-blue-800">In Progress</h2><span id="count-in_progress" class="bg-blue-200 text-blue-800 text-xs font-bold px-2 py-1 rounded-full">0</span></div><div id="col-in_progress" class="kanban-column space-y-3 flex-1 rounded-lg" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event, 'in_progress')"></div></div>
        <div class="bg-red-50 rounded-xl p-4 border border-red-200 shadow-sm flex flex-col h-full"><div class="flex items-center justify-between mb-4 px-1"><h2 class="font-semibold text-red-800">Blocked</h2><span id="count-blocked" class="bg-red-200 text-red-800 text-xs font-bold px-2 py-1 rounded-full">0</span></div><div id="col-blocked" class="kanban-column space-y-3 flex-1 rounded-lg" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event, 'blocked')"></div></div>
        <div class="bg-green-50 rounded-xl p-4 border border-green-200 shadow-sm flex flex-col h-full"><div class="flex items-center justify-between mb-4 px-1"><h2 class="font-semibold text-green-800">Completed</h2><span id="count-completed" class="bg-green-200 text-green-800 text-xs font-bold px-2 py-1 rounded-full">0</span></div><div id="col-completed" class="kanban-column space-y-3 flex-1 rounded-lg" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event, 'completed')"></div></div>
      </div>

      <div id="table-view" class="hidden overflow-x-auto bg-white rounded-xl shadow-sm border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Task</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Project</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Assignee</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Priority</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Due Date</th><th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th></tr>
          </thead>
          <tbody id="table-body" class="bg-white divide-y divide-gray-200"></tbody>
        </table>
      </div>
    </div>
    
    <?!= include('components/modal_add'); ?>
    <?!= include('components/modal_edit'); ?>
    <?!= include('components/modal_delete'); ?>

    <?!= include('js/js_core'); ?>
    <?!= include('js/js_render'); ?>
    <?!= include('js/js_modals'); ?>
  </body>
</html>
