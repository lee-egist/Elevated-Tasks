<script>

  // --- PROJECT DATA & UI ---
  let globalProjects = [];

  // Fetch projects as soon as the app loads
  window.addEventListener('DOMContentLoaded', fetchProjects);

  function fetchProjects() {
    google.script.run
      .withSuccessHandler(function (projects) {
        globalProjects = projects;
        populateProjectDropdowns();

        // Also update the main dashboard filter in js_core!
        if (typeof renderDashboardProjectFilter === 'function') {
          renderDashboardProjectFilter(projects);
        }
      })
      .withFailureHandler(function (err) {
        console.error("Failed to load projects: ", err);
      })
      .getDashboardProjects();
  }

  function populateProjectDropdowns() {
    const addSelect = document.getElementById('add-project');
    const editSelect = document.getElementById('edit-project');

    let optionsHtml = '<option value="">-- No Project (Unassigned) --</option>';
    globalProjects.forEach(p => {
      // Remember: The value is now the strict UUID, but the user sees the Name!
      optionsHtml += `<option value="${p.id}">${p.name}</option>`;
    });

    if (addSelect) addSelect.innerHTML = optionsHtml;
    if (editSelect) editSelect.innerHTML = optionsHtml;
  }

  // Handle the "+ New" Button
  function handleCreateProject() {
    const projectName = prompt("Enter the name of the new Project:\n(You will automatically be set as the Owner)");

    if (!projectName || projectName.trim() === "") return;

    // Show loading state on the button
    const btns = document.querySelectorAll('button[onclick="handleCreateProject()"]');
    btns.forEach(b => { b.innerText = "..."; b.disabled = true; });

    google.script.run
      .withSuccessHandler(function (newProject) {
        // Add it to our local array and re-render the dropdowns
        globalProjects.push(newProject);
        globalProjects.sort((a, b) => a.name.localeCompare(b.name));
        populateProjectDropdowns();

        if (typeof renderDashboardProjectFilter === 'function') {
          renderDashboardProjectFilter(globalProjects);
        }

        // Auto-select the newly created project in the active modal
        const addSelect = document.getElementById('add-project');
        const editSelect = document.getElementById('edit-project');
        if (addSelect && document.getElementById('addModal').style.display !== 'none') {
          addSelect.value = newProject.id;
        }
        if (editSelect && !document.getElementById('editModal').classList.contains('hidden')) {
          editSelect.value = newProject.id;
        }

        btns.forEach(b => { b.innerText = "+ New"; b.disabled = false; });
      })
      .withFailureHandler(function (err) {
        alert("Failed to create project: " + err.message);
        btns.forEach(b => { b.innerText = "+ New"; b.disabled = false; });
      })
      .createNewProject(projectName);
  }

  // --- ADD TASK MODAL ---
  function triggerAddTask() {
    document.getElementById('add-title').value = '';
    document.getElementById('add-description').value = '';
    document.getElementById('add-project').value = '';
    document.getElementById('add-assignee').value = '';
    document.getElementById('add-priority').value = 'medium';
    document.getElementById('add-type').value = 'general';
    document.getElementById('add-start-date').value = '';
    document.getElementById('add-due-date').value = '';
    document.getElementById('add-blocked-by').value = '';

    document.getElementById('addModal').style.display = 'flex';
    document.getElementById('add-title').focus();
  }

  function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }

  function submitNewTask(ev) {
    ev.preventDefault();
    const btnEl = document.getElementById('submitAddBtn');
    const title = document.getElementById('add-title').value.trim();
    if (!title) return;

    btnEl.innerText = "Creating...";
    btnEl.disabled = true;

    const newTaskData = {
      title: title,
      description: document.getElementById('add-description').value,
      project: document.getElementById('add-project').value,
      assignee: document.getElementById('add-assignee').value,
      priority: document.getElementById('add-priority').value,
      status: "open",
      type: document.getElementById('add-type').value,
      start_date: document.getElementById('add-start-date').value,
      due_date: document.getElementById('add-due-date').value,
      blocked_by: document.getElementById('add-blocked-by').value
    };

    google.script.run
      .withSuccessHandler(function () {
        btnEl.innerText = "Create Task";
        btnEl.disabled = false;
        closeAddModal();
        loadTasks();
      })
      .withFailureHandler(function (error) {
        alert("Failed to create task: " + error.message);
        btnEl.innerText = "Create Task";
        btnEl.disabled = false;
      })
      .createDashboardTask("@default", newTaskData);
  }

  // --- EDIT TASK MODAL ---
  function openEditModal(taskId) {
    const task = currentTasks.find(t => t.id === taskId);
    if (!task) return;

    const formatDateForInput = (dateString) => {
      if (!dateString) return '';
      const d = new Date(dateString);
      if (isNaN(d.getTime())) return '';
      return d.toISOString().split('T')[0];
    };

    document.getElementById('edit-taskId').value = task.id;
    document.getElementById('display-task-id').value = task.id;
    document.getElementById('edit-taskListId').value = task.taskListId;
    document.getElementById('edit-status').value = task.status;
    document.getElementById('edit-title').value = task.title || '';
    document.getElementById('edit-description').value = task.description || '';
    document.getElementById('edit-project').value = task.project || '';
    document.getElementById('edit-assignee').value = task.assignee || '';
    document.getElementById('edit-priority').value = task.priority || 'medium';
    document.getElementById('edit-type').value = task.type || 'general';
    document.getElementById('edit-start-date').value = formatDateForInput(task.start_date);
    document.getElementById('edit-due-date').value = formatDateForInput(task.due_date);
    document.getElementById('edit-blocked-by').value = task.blocked_by || '';

    document.getElementById('editModal').classList.remove('hidden');
  }

  function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

  function saveTaskEdit(ev) {
    ev.preventDefault();
    const btn = document.getElementById('saveBtn');
    const text = document.getElementById('saveText');
    const spinner = document.getElementById('saveSpinner');

    btn.disabled = true;
    text.innerText = "Saving...";
    if (spinner) spinner.classList.remove('hidden');

    const taskId = document.getElementById('edit-taskId').value;
    const taskListId = document.getElementById('edit-taskListId').value;
    const updatedData = {
      title: document.getElementById('edit-title').value,
      description: document.getElementById('edit-description').value,
      project: document.getElementById('edit-project').value,
      assignee: document.getElementById('edit-assignee').value,
      priority: document.getElementById('edit-priority').value,
      status: document.getElementById('edit-status').value,
      type: document.getElementById('edit-type').value,
      start_date: document.getElementById('edit-start-date').value,
      due_date: document.getElementById('edit-due-date').value,
      blocked_by: document.getElementById('edit-blocked-by').value
    };

    google.script.run
      .withSuccessHandler(() => {
        const taskIndex = currentTasks.findIndex(t => t.id === taskId);
        if (taskIndex > -1) {
          currentTasks[taskIndex] = { ...currentTasks[taskIndex], ...updatedData };
        }
        populateProjectFilter(currentTasks);
        applyFiltersAndSort();
        closeEditModal();
        resetSaveButton(btn, text, spinner);
      })
      .withFailureHandler((err) => {
        alert("Error saving task: " + err.message);
        resetSaveButton(btn, text, spinner);
      })
      .updateDashboardTaskDetails(taskId, taskListId, updatedData);
  }

  function resetSaveButton(btn, text, spinner) {
    btn.disabled = false;
    text.innerText = "Save Changes";
    if (spinner) spinner.classList.add('hidden');
  }

  // --- DELETE TASK MODAL ---
  let taskPendingDeletion = null;

  function handleDeleteFromModal() {
    const taskId = document.getElementById('edit-taskId').value;
    if (!taskId) return;
    taskPendingDeletion = taskId;
    document.getElementById('deleteModal').style.display = 'flex';
  }

  function closeDeleteModal() {
    taskPendingDeletion = null;
    document.getElementById('deleteModal').style.display = 'none';
    const btn = document.getElementById('confirmDeleteBtn');
    if (btn) { btn.innerText = 'Yes, Delete'; btn.disabled = false; }
  }

  function executeDeleteTask() {
    if (!taskPendingDeletion) return;
    const taskId = taskPendingDeletion;
    const btn = document.getElementById('confirmDeleteBtn');

    btn.innerText = "Deleting...";
    btn.disabled = true;

    closeDeleteModal();
    closeEditModal();

    const cardElement = document.getElementById('task-' + taskId);
    if (cardElement) cardElement.remove();

    google.script.run
      .withFailureHandler(function (error) {
        alert("Server failed to delete task: " + error.message);
        loadTasks();
      })
      .deleteTask(taskId);
  }

  // --- UTILITIES ---
  function copyTaskId(event) {
    const idInput = document.getElementById('display-task-id');
    const btn = event.currentTarget;

    // Copy to clipboard
    navigator.clipboard.writeText(idInput.value).then(() => {
      // Visual feedback
      const originalText = btn.innerText;
      btn.innerText = 'Copied!';
      btn.classList.add('bg-green-100', 'text-green-700', 'border-green-200');

      setTimeout(() => {
        btn.innerText = originalText;
        btn.classList.remove('bg-green-100', 'text-green-700', 'border-green-200');
      }, 2000);
    }).catch(err => {
      alert("Failed to copy text: " + err);
    });
  }

  // --- IMPORT MODAL ---
  function openImportModal() {
    document.getElementById('importModal').style.display = 'flex';
  }

  function closeImportModal() {
    document.getElementById('importModal').style.display = 'none';
  }

  function runGoogleTasksMigration(btnElement) {
    const originalHtml = btnElement.innerHTML;
    btnElement.innerHTML = `<div class="p-4 text-center w-full font-bold text-blue-600">Migrating Tasks... Please wait ⏳</div>`;
    btnElement.disabled = true;

    google.script.run
      .withSuccessHandler((count) => {
        alert(`Success! Imported ${count} tasks into Supabase.`);
        closeImportModal();
        btnElement.innerHTML = originalHtml;
        btnElement.disabled = false;
        loadTasks(); // Refresh the board!
      })
      .withFailureHandler((err) => {
        alert("Migration failed: " + err.message);
        btnElement.innerHTML = originalHtml;
        btnElement.disabled = false;
      })
      .migrateLegacyGoogleTasks();
  }

// --- CSV UPLOAD HANDLING ---
  let selectedPlatform = 'generic';

  function triggerCSVUpload(platform) {
    selectedPlatform = platform;
    document.getElementById('csvFileInput').click(); // Opens the hidden file browser
  }

  function handleCSVSelection(event) {
    const file = event.target.files[0];
    if (!file) return;

    // Show the progress UI
    document.getElementById('csvUploadProgress').classList.remove('hidden');
    document.getElementById('csvUploadStatus').innerText = `Uploading ${file.name} to server...`;

    // Read the file as text
    const reader = new FileReader();
    reader.onload = function(e) {
      const csvContent = e.target.result;
      
      // Send the raw CSV text and the platform name to our backend parser
      google.script.run
        .withSuccessHandler(function(result) {
          document.getElementById('csvUploadProgress').classList.add('hidden');
          alert(`Success! Imported ${result.count} tasks from ${selectedPlatform}.`);
          closeImportModal();
          loadTasks(); // Refresh your dashboard
        })
        .withFailureHandler(function(err) {
          document.getElementById('csvUploadProgress').classList.add('hidden');
          alert(`Error importing CSV: ${err.message}`);
        })
        .processCSVImport(csvContent, selectedPlatform);
    };
    
    reader.readAsText(file);
    
    // Clear the input so they can upload the same file again if it failed
    event.target.value = ''; 
  }
  
</script>
