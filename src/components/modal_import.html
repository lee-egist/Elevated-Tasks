<div id="importModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h2 class="text-lg font-bold text-gray-800">Import Tasks</h2>
            <button onclick="closeImportModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <div class="p-6 overflow-y-auto">
            <p class="text-sm text-gray-600 mb-6">Select your current tool. You will be prompted to upload the CSV
                export file from that platform.</p>

            <input type="file" id="csvFileInput" accept=".csv" class="hidden" onchange="handleCSVSelection(event)">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <button onclick="runGoogleTasksMigration(this)"
                    class="text-left p-4 border border-gray-200 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition-all flex items-center gap-4 col-span-1 md:col-span-2">
                    <div class="text-2xl">🔄</div>
                    <div>
                        <div class="font-bold text-gray-900">Google Tasks (Legacy)</div>
                        <div class="text-xs text-gray-500">Directly syncs your old metadata tasks into the new database.
                        </div>
                    </div>
                </button>

                <div class="col-span-1 md:col-span-2 flex items-center gap-4 my-2">
                    <div class="h-px bg-gray-200 flex-1"></div>
                    <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider">CSV Uploads</span>
                    <div class="h-px bg-gray-200 flex-1"></div>
                </div>

                <button onclick="triggerCSVUpload('asana')"
                    class="text-left p-4 border border-gray-200 rounded-lg hover:border-coral-500 hover:bg-red-50 transition-all flex items-center gap-3">
                    <div
                        class="w-8 h-8 rounded-full bg-red-500 text-white flex items-center justify-center font-bold text-xs">
                        A</div>
                    <div>
                        <div class="font-bold text-gray-900">Asana</div>
                        <div class="text-xs text-gray-500">Upload Asana CSV</div>
                    </div>
                </button>

                <button onclick="triggerCSVUpload('trello')"
                    class="text-left p-4 border border-gray-200 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition-all flex items-center gap-3">
                    <div
                        class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold text-xs">
                        T</div>
                    <div>
                        <div class="font-bold text-gray-900">Trello</div>
                        <div class="text-xs text-gray-500">Upload Trello CSV</div>
                    </div>
                </button>

                <button onclick="triggerCSVUpload('jira')"
                    class="text-left p-4 border border-gray-200 rounded-lg hover:border-blue-600 hover:bg-blue-50 transition-all flex items-center gap-3">
                    <div
                        class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-xs">
                        J</div>
                    <div>
                        <div class="font-bold text-gray-900">Jira</div>
                        <div class="text-xs text-gray-500">Upload Jira CSV</div>
                    </div>
                </button>

                <button onclick="triggerCSVUpload('monday')"
                    class="text-left p-4 border border-gray-200 rounded-lg hover:border-red-400 hover:bg-red-50 transition-all flex items-center gap-3">
                    <div
                        class="w-8 h-8 rounded-full bg-red-400 text-white flex items-center justify-center font-bold text-xs">
                        M</div>
                    <div>
                        <div class="font-bold text-gray-900">Monday.com</div>
                        <div class="text-xs text-gray-500">Upload Monday CSV</div>
                    </div>
                </button>

                <button onclick="triggerCSVUpload('notion')"
                    class="text-left p-4 border border-gray-200 rounded-lg hover:border-gray-800 hover:bg-gray-100 transition-all flex items-center gap-3">
                    <div
                        class="w-8 h-8 rounded-full bg-gray-900 text-white flex items-center justify-center font-bold text-xs">
                        N</div>
                    <div>
                        <div class="font-bold text-gray-900">Notion</div>
                        <div class="text-xs text-gray-500">Upload Notion CSV</div>
                    </div>
                </button>

                <button onclick="triggerCSVUpload('generic')"
                    class="text-left p-4 border border-gray-200 rounded-lg hover:border-green-500 hover:bg-green-50 transition-all flex items-center gap-3">
                    <div
                        class="w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center font-bold text-xs">
                        📊</div>
                    <div>
                        <div class="font-bold text-gray-900">Generic CSV</div>
                        <div class="text-xs text-gray-500">Standard spreadsheet</div>
                    </div>
                </button>

            </div>

            <div id="csvUploadProgress"
                class="hidden mt-6 p-4 bg-blue-50 border border-blue-200 rounded-lg text-center">
                <div class="font-bold text-blue-700 mb-1">Processing File...</div>
                <div class="text-sm text-blue-600" id="csvUploadStatus">Reading rows and matching columns to Supabase.
                </div>
            </div>

        </div>
    </div>
</div>
