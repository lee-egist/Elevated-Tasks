name: Multi-Env Deploy

on:
  push:
    branches: [main, develop] # Triggers on both branches

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auth Clasp
        run: echo "${{ secrets.CLASPRC_JSON }}" > ~/.clasprc.json

      # STEP: Determine Environment Variables
      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TARGET_SCRIPT_ID=${{ secrets.PROD_SCRIPT_ID }}" >> $GITHUB_ENV
            echo "IS_PROD=true" >> $GITHUB_ENV
          else
            echo "TARGET_SCRIPT_ID=${{ secrets.DEV_SCRIPT_ID }}" >> $GITHUB_ENV
            echo "IS_PROD=false" >> $GITHUB_ENV
          fi

      # STEP: Overwrite .clasp.json dynamically
      - name: Configure .clasp.json
        run: |
          echo "{\"scriptId\":\"$TARGET_SCRIPT_ID\",\"rootDir\":\"src\"}" > .clasp.json

      - name: Push Code
        run: npx @google/clasp push -f

      # STEP: Only run full 'deploy' for Production
      - name: Deploy to Production
        if: env.IS_PROD == 'true'
        run: |
          npx @google/clasp deploy \
            --deploymentId ${{ secrets.PROD_DEPLOYMENT_ID }} \
            --description "Prod Release: ${{ github.sha }}"