<script>
  // --- GLOBALS & STARTUP SEQUENCE ---
  let currentUserProfile = null;
  let currentTasks = [];    // SINGLE SOURCE OF TRUTH FOR TASKS
  let currentView = 'board'; 
  const priorityWeights = { 'critical': 4, 'high': 3, 'medium': 2, 'low': 1, '': 0 };

  window.addEventListener('DOMContentLoaded', function () {
    google.script.run
      .withSuccessHandler(function (profile) {
        currentUserProfile = profile;
        if (typeof fetchProjects === 'function') fetchProjects();
        if (typeof loadTasks === 'function') loadTasks();
      })
      .withFailureHandler(function (err) {
        console.error("Failed to ensure profile: ", err);
        if (typeof fetchProjects === 'function') fetchProjects();
        if (typeof loadTasks === 'function') loadTasks();
      })
      .ensureCurrentUserProfile();
  });

  // --- JUST-IN-TIME ONBOARDING INTERCEPTOR ---
  function requireCompleteProfile(element) {
    if (currentUserProfile && currentUserProfile.is_basic) {
      if (element) element.blur(); 
      const modalHeader = document.querySelector('#onboardingModal h2');
      const modalSubtext = document.querySelector('#onboardingModal p');
      if (modalHeader) modalHeader.innerText = "Team Feature Unlocked!";
      if (modalSubtext) modalSubtext.innerText = "Before you can assign tasks to others, please complete your profile.";
      document.getElementById('onboardingModal').style.display = 'flex';
    }
  }

  // --- API COMMUNICATION ---
  function loadTasks() {
    document.getElementById('board').classList.add('hidden');
    document.getElementById('table-view').classList.add('hidden');
    document.getElementById('no-results').classList.add('hidden');
    document.getElementById('loading').classList.remove('hidden');

    google.script.run
      .withSuccessHandler(receiveData)
      .withFailureHandler(showError)
      .getDashboardData(); // Assuming this returns dbGetTasks()
  }

  function receiveData(tasks) {
    currentTasks = tasks;
    document.getElementById('loading').classList.add('hidden');
    applyFiltersAndSort();
  }

  function showError(err) {
    document.getElementById('loading').innerHTML = `
      <div class="text-red-600 bg-red-50 p-4 rounded-lg border border-red-200 shadow-sm max-w-md mx-auto text-center">
        <strong class="block mb-2 text-lg">Error loading tasks</strong>
        <span>${err.message}</span>
      </div>
    `;
  }

  // --- FILTERING & SORTING ---
  function clearFilters() {
    document.getElementById('filter-search').value = '';
    document.getElementById('filter-status').value = 'all';
    document.getElementById('filter-priority').value = 'all';
    document.getElementById('filter-project').value = 'all';
    document.getElementById('sort-by').value = 'default';
    applyFiltersAndSort();
  }

  function renderDashboardProjectFilter(projects) {
    const projectSelect = document.getElementById('filter-project');
    if (!projectSelect) return;

    const currentSelection = projectSelect.value;
    let optionsHtml = '<option value="all">All Projects</option><option value="unassigned">No Project</option>';
    
    projects.forEach(p => {
      optionsHtml += `<option value="${p.id}">${p.name}</option>`;
    });

    projectSelect.innerHTML = optionsHtml;

    const exists = projects.some(p => p.id === currentSelection);
    if (currentSelection === 'unassigned' || exists) {
      projectSelect.value = currentSelection;
    } else {
      projectSelect.value = 'all';
    }
  }

  function calculateCriticalPath(tasks) {
    const activeTasks = tasks.filter(t => t.status !== 'completed');
    const adjList = {};

    activeTasks.forEach(t => adjList[t.id] = []);
    activeTasks.forEach(t => {
      if (t.blocked_by && adjList[t.blocked_by]) {
        adjList[t.blocked_by].push(t.id);
      }
    });

    let longestPath = [];
    const memo = {};

    function dfs(nodeId, currentPathVisited) {
      if (currentPathVisited.has(nodeId)) return []; 
      if (memo[nodeId]) return memo[nodeId];

      currentPathVisited.add(nodeId);
      let maxSubPath = [];

      for (const neighbor of adjList[nodeId]) {
        const subPath = dfs(neighbor, new Set(currentPathVisited));
        if (subPath.length > maxSubPath.length) {
          maxSubPath = subPath;
        }
      }

      memo[nodeId] = [nodeId, ...maxSubPath];
      return memo[nodeId];
    }

    activeTasks.forEach(t => {
      const path = dfs(t.id, new Set());
      if (path.length > longestPath.length && path.length > 1) {
        longestPath = path;
      }
    });

    return longestPath;
  }

  function applyFiltersAndSort() {
    if (!currentTasks || currentTasks.length === 0) return;

    const searchText = document.getElementById('filter-search').value.toLowerCase();
    const statusFilter = document.getElementById('filter-status').value;
    const priorityFilter = document.getElementById('filter-priority').value;
    const projectFilter = document.getElementById('filter-project').value;
    const sortBy = document.getElementById('sort-by').value;

    let processedTasks = currentTasks.filter(task => {
      if (statusFilter !== 'all' && task.status !== statusFilter) return false;
      if (priorityFilter !== 'all' && task.priority !== priorityFilter) return false;

      // STRICT UUID FILTERING FOR SUPABASE
      const taskProjectId = task.project_id || 'unassigned';
      if (projectFilter !== 'all') {
        if (projectFilter !== taskProjectId) return false;
      }

      if (searchText) {
        const matchesTitle = (task.title || '').toLowerCase().includes(searchText);
        const matchesDesc = (task.description || '').toLowerCase().includes(searchText);
        const matchesAssignee = (task.assignee || '').toLowerCase().includes(searchText);
        // Safely extract the joined project name from Supabase
        const projectName = (task.projects && task.projects.name) ? task.projects.name.toLowerCase() : '';
        const matchesProject = projectName.includes(searchText);
        
        if (!matchesTitle && !matchesDesc && !matchesAssignee && !matchesProject) return false;
      }
      return true;
    });

    processedTasks.sort((a, b) => {
      const projA = (a.projects && a.projects.name) ? a.projects.name : '';
      const projB = (b.projects && b.projects.name) ? b.projects.name : '';
      
      switch (sortBy) {
        case 'dueDateAsc': return (a.due_date ? new Date(a.due_date) : Infinity) - (b.due_date ? new Date(b.due_date) : Infinity);
        case 'dueDateDesc': return (b.due_date ? new Date(b.due_date) : 0) - (a.due_date ? new Date(a.due_date) : 0);
        case 'priorityDesc': return (priorityWeights[b.priority || ''] || 0) - (priorityWeights[a.priority || ''] || 0);
        case 'priorityAsc': return (priorityWeights[a.priority || ''] || 0) - (priorityWeights[b.priority || ''] || 0);
        case 'titleAsc': return (a.title || '').localeCompare(b.title || '');
        case 'projectAsc': return projA.localeCompare(projB);
        default: return 0;
      }
    });

    document.getElementById('no-results').classList.add('hidden');
    if (processedTasks.length === 0) {
      document.getElementById('board').classList.add('hidden');
      document.getElementById('table-view').classList.add('hidden');
      document.getElementById('no-results').classList.remove('hidden');
    } else {
      let criticalPathIds = [];
      if (projectFilter !== 'all' && projectFilter !== 'unassigned') {
        criticalPathIds = calculateCriticalPath(processedTasks);
      }
      renderBoard(processedTasks, criticalPathIds);
      renderTable(processedTasks, criticalPathIds);
      switchView(currentView);
    }
  }

  function switchView(view) {
    currentView = view;
    const btnBoard = document.getElementById('btn-view-board');
    const btnTable = document.getElementById('btn-view-table');
    const boardContainer = document.getElementById('board');
    const tableContainer = document.getElementById('table-view');
    const noResults = !document.getElementById('no-results').classList.contains('hidden');

    if (view === 'board') {
      btnBoard.className = "px-3 py-1.5 bg-white shadow-sm rounded-md text-sm font-medium text-gray-800 transition-colors";
      btnTable.className = "px-3 py-1.5 text-gray-600 hover:text-gray-800 rounded-md text-sm font-medium transition-colors";
      if (!noResults) { boardContainer.classList.remove('hidden'); tableContainer.classList.add('hidden'); }
    } else {
      btnTable.className = "px-3 py-1.5 bg-white shadow-sm rounded-md text-sm font-medium text-gray-800 transition-colors";
      btnBoard.className = "px-3 py-1.5 text-gray-600 hover:text-gray-800 rounded-md text-sm font-medium transition-colors";
      if (!noResults) { tableContainer.classList.remove('hidden'); boardContainer.classList.add('hidden'); }
    }
  }
</script>
