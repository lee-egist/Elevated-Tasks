name: Deploy Apps Script

on:
  push:
    branches:
      - main  # Triggers only when code is merged into main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      # Decodes the .clasprc.json from GitHub Secrets
      - name: Create clasp auth file
        run: echo "${{ secrets.CLASPRC_JSON }}" > ~/.clasprc.json

      - name: Push to Apps Script
        run: npx @google/clasp push -f

      # Deploys a new version and updates the existing deployment ID
      - name: Deploy Version
        run: |
          npx @google/clasp deploy \
            --deploymentId ${{ secrets.DEPLOYMENT_ID }} \
            --description "Deployed from GitHub Action (Commit: ${{ github.sha }})"